<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK Workflow Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Toolbar ── -->
<div id="toolbar">
  <span class="toolbar-brand">DK Workflow</span>
  <div class="toolbar-sep"></div>

  <select id="filter-assignee"></select>
  <select id="filter-project"></select>
  <select id="filter-status">
    <option value="">상태 전체</option>
    <option value="todo">대기</option>
    <option value="wip">진행중</option>
    <option value="done">완료</option>
  </select>

  <div class="toolbar-sep"></div>

  <button id="btn-reset-view">뷰 초기화</button>
  <button id="btn-relayout">레이아웃 재배치</button>

  <div class="spacer"></div>

  <button id="btn-add-project" class="primary">+ 프로젝트</button>
  <button id="btn-import">JSON 불러오기</button>
  <button id="btn-export">JSON 내보내기</button>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="graph-container"></div>

  <!-- ── Side Panel ── -->
  <div id="side-panel">
    <div class="panel-header">
      <h3 id="panel-title">편집</h3>
      <button id="panel-close">✕</button>
    </div>

    <!-- Task panel -->
    <div id="panel-task" class="panel-body" style="display:none">
      <div class="project-context-label" id="task-project-label"></div>

      <div class="form-group">
        <label>태스크 이름</label>
        <input type="text" id="task-name-input">
      </div>
      <div class="form-group">
        <label>담당자</label>
        <input type="text" id="task-assignee-input" placeholder="이름 입력">
      </div>
      <div class="form-group">
        <label>상태</label>
        <select id="task-status-input">
          <option value="todo">대기</option>
          <option value="wip">진행중</option>
          <option value="done">완료</option>
        </select>
      </div>
      <div class="form-group">
        <label>마감일</label>
        <input type="date" id="task-due-input">
      </div>
      <div class="form-group">
        <label>메모</label>
        <textarea id="task-note-input" placeholder="메모 입력..."></textarea>
      </div>

      <div class="btn-row">
        <button id="btn-save-task" class="primary">저장</button>
        <button id="btn-add-task">태스크 추가</button>
      </div>
      <div class="btn-row">
        <button id="btn-move-up">↑ 앞으로</button>
        <button id="btn-move-down">↓ 뒤로</button>
        <button id="btn-delete-task" class="danger">삭제</button>
      </div>
    </div>

    <!-- Project panel -->
    <div id="panel-project" class="panel-body" style="display:none">
      <div class="form-group">
        <label>프로젝트</label>
        <div id="project-name-display" style="font-size:15px;font-weight:700;padding:4px 0;"></div>
      </div>
      <div class="form-group">
        <label>색상</label>
        <input type="color" id="project-color-input" style="height:36px;padding:2px;cursor:pointer;">
      </div>

      <div class="panel-section-label">카테고리</div>
      <div id="category-list"></div>

      <div class="btn-row">
        <button id="btn-add-category" class="primary">+ 카테고리</button>
        <button id="btn-add-task">+ 태스크</button>
      </div>
      <div class="btn-row">
        <button id="btn-delete-project" class="danger">프로젝트 삭제</button>
      </div>
    </div>

    <!-- Category panel -->
    <div id="panel-category" class="panel-body" style="display:none">
      <div class="project-context-label" id="cat-project-label"></div>
      <div class="form-group">
        <label>카테고리</label>
        <div id="cat-name-display" style="font-size:15px;font-weight:700;padding:4px 0;"></div>
      </div>

      <div class="panel-section-label">태스크 목록</div>
      <div id="cat-task-list"></div>

      <div class="btn-row">
        <button id="btn-add-task">+ 태스크 추가</button>
      </div>
      <div class="btn-row">
        <button id="btn-delete-category" class="danger">카테고리 삭제</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
