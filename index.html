<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DK Workflow</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2.1">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ── 로그인 오버레이 ── -->
<div id="login-overlay" class="hidden">
  <div id="login-card">
    <div class="login-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2"  y="2"  width="5" height="5" rx="1.2" fill="#EBEBEB"/>
        <rect x="9"  y="2"  width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="16" y="2"  width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="23" y="2"  width="5" height="5" rx="1.2" fill="#EBEBEB"/>
        <rect x="2"  y="9"  width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="9"  y="9"  width="5" height="5" rx="1.2" fill="#212121"/>
        <rect x="16" y="9"  width="5" height="5" rx="1.2" fill="#212121"/>
        <rect x="23" y="9"  width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="2"  y="16" width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="9"  y="16" width="5" height="5" rx="1.2" fill="#212121"/>
        <rect x="16" y="16" width="5" height="5" rx="1.2" fill="#212121"/>
        <rect x="23" y="16" width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="2"  y="23" width="5" height="5" rx="1.2" fill="#EBEBEB"/>
        <rect x="9"  y="23" width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="16" y="23" width="5" height="5" rx="1.2" fill="#C8102E"/>
        <rect x="23" y="23" width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      </svg>
      Loom
    </div>
    <p class="login-sub">누구신가요?</p>
    <div id="login-error" class="login-error" style="display:none"></div>
    <div class="login-field">
      <label for="login-name-select">이름</label>
      <select id="login-name-select">
        <option value="">이름을 선택하세요</option>
        <option value="민경">민경</option>
        <option value="창규">창규</option>
        <option value="진희">진희</option>
        <option value="정현">정현</option>
        <option value="관리자">관리자</option>
      </select>
    </div>
    <div class="login-field">
      <label for="login-password">비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button id="login-submit" type="button" onclick="window.__doLogin && window.__doLogin()">로그인</button>
    <div style="text-align:center;margin-top:16px;font-size:11px;color:#BDBDBD" id="login-version">v2.3</div>
  </div>
</div>

<!-- ── 앱 로딩 스플래시 ── -->
<div id="app-loading">
  <div class="app-loading-inner">
    <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
      <rect x="2"  y="2"  width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="9"  y="2"  width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="16" y="2"  width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="23" y="2"  width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="2"  y="9"  width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="9"  y="9"  width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="16" y="9"  width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="23" y="9"  width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="2"  y="16" width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="9"  y="16" width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="16" y="16" width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="23" y="16" width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="2"  y="23" width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="9"  y="23" width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="16" y="23" width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="23" y="23" width="5" height="5" rx="1.2" fill="#EBEBEB"/>
    </svg>
    <span>Loom</span>
    <span id="loading-version" style="font-size:11px;color:#BDBDBD;margin-top:4px">v2.3</span>
  </div>
</div>

<!-- ── 툴바 ── -->
<div id="toolbar">
  <div class="brand">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <rect x="2"  y="2"  width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="9"  y="2"  width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="16" y="2"  width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="23" y="2"  width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="2"  y="9"  width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="9"  y="9"  width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="16" y="9"  width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="23" y="9"  width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="2"  y="16" width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="9"  y="16" width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="16" y="16" width="5" height="5" rx="1.2" fill="#C8102E"/>
      <rect x="23" y="16" width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="2"  y="23" width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="9"  y="23" width="5" height="5" rx="1.2" fill="#212121"/>
      <rect x="16" y="23" width="5" height="5" rx="1.2" fill="#EBEBEB"/>
      <rect x="23" y="23" width="5" height="5" rx="1.2" fill="#EBEBEB"/>
    </svg>
    Loom
    <span id="toolbar-version" style="font-size:10px;font-weight:500;color:#BDBDBD;margin-left:2px;letter-spacing:0"></span>
  </div>
  <div class="sep"></div>

  <select id="filter-project"></select>
  <select id="filter-assignee"></select>
  <select id="filter-status">
    <option value="">상태 전체</option>
    <option value="pre">착수전</option>
    <option value="doing">진행 중</option>
    <option value="waiting">대기</option>
    <option value="delayed">지연</option>
    <option value="review">완료요청</option>
    <option value="inactive">미진행</option>
    <option value="done">완료</option>
    <option value="closed">종결</option>
  </select>

  <div class="sep"></div>
  <button id="btn-undo" class="icon-btn" title="실행 취소 (Ctrl+Z)" disabled>↩</button>
  <button id="btn-redo" class="icon-btn" title="다시 실행 (Ctrl+Y)" disabled>↪</button>
  <div class="sep"></div>
  <button id="btn-reset-view">뷰 초기화</button>

  <div class="spacer"></div>

  <span class="hint">빈 곳 더블클릭 → 업무 추가 &nbsp;|&nbsp; 노드 끝 드래그 → 연결</span>

  <div class="spacer"></div>

  <button id="btn-switch-user" class="user-btn"></button>
  <button id="btn-logout" class="logout-btn">로그아웃</button>
  <div class="sep"></div>
  <button id="btn-add-group">+ 묶음 추가</button>
  <button id="btn-add-task">+ 업무 추가</button>
  <button id="btn-add-project" class="primary">
    + 프로젝트
    <span id="pending-badge" class="pending-badge" style="display:none"></span>
  </button>
  <button id="btn-template-load">템플릿</button>
  <button id="btn-template-save">템플릿 저장</button>
  <button id="btn-manage-projects">프로젝트 관리</button>
  <button id="btn-manage-users">사용자 관리</button>
  <div class="sep"></div>
  <button id="btn-view-graph" class="view-btn active">그래프</button>
  <button id="btn-view-calendar" class="view-btn">캘린더</button>
  <div class="sep"></div>
  <button id="btn-backup">백업</button>
  <button id="btn-import">가져오기</button>
  <button id="btn-export">내보내기</button>
</div>

<!-- ── 오버뷰 바 ── -->
<div id="overview-bar" style="display:none"></div>

<!-- ── 캘린더 뷰 ── -->
<div id="calendar-view" style="display:none">
  <div id="calendar-header">
    <button id="cal-prev">‹</button>
    <span id="cal-month-label"></span>
    <button id="cal-next">›</button>
  </div>
  <div id="calendar-grid"></div>
</div>

<!-- ── 메인 ── -->
<div id="main">

  <!-- ── 뷰 사이드바 ── -->
  <div id="view-sidebar">
    <div class="sidebar-title">VIEWS</div>
    <div id="view-list"></div>
    <button id="btn-add-view" style="display:none">+ 새 시트</button>
  </div>

  <div id="graph-container"></div>

  <!-- ── 사이드 패널 ── -->
  <div id="side-panel">
    <div class="panel-header">
      <h3>업무 편집</h3>
      <button id="panel-close">✕</button>
    </div>
    <div class="panel-body">

      <div class="form-group">
        <label>업무명</label>
        <input type="text" id="task-name" placeholder="업무 이름을 입력하세요">
      </div>

      <div class="form-group">
        <label>프로젝트</label>
        <select id="task-project"></select>
      </div>

      <div class="form-group">
        <label>담당자</label>
        <select id="task-assignee"></select>
      </div>

      <div class="form-group">
        <label>상태</label>
        <select id="task-status">
          <option value="pre">착수전</option>
          <option value="doing">진행 중</option>
          <option value="waiting">대기</option>
          <option value="delayed">지연</option>
          <option value="review">완료요청</option>
          <option value="inactive">미진행</option>
          <option value="done">완료</option>
          <option value="closed">종결</option>
        </select>
      </div>

      <div class="form-group">
        <label style="display:flex;justify-content:space-between;align-items:center">
          묶음
          <button id="btn-manage-groups" type="button" class="label-action-btn">묶음 관리</button>
        </label>
        <div style="display:flex;gap:6px;align-items:center">
          <span id="task-group-swatch" style="width:10px;height:10px;border-radius:2px;flex-shrink:0;display:none"></span>
          <select id="task-group" style="flex:1"><option value="">묶음 없음</option></select>
        </div>
      </div>

      <div class="form-group">
        <label>마감일</label>
        <input type="date" id="task-due-date">
      </div>

      <div class="form-group">
        <label>메모</label>
        <textarea id="task-note" rows="3" placeholder="메모를 입력하세요"></textarea>
      </div>

      <div class="btn-row">
        <button id="btn-save-task" class="primary">저장</button>
        <button id="btn-delete-task" class="danger">삭제</button>
      </div>
      <button id="btn-copy-task" class="btn-small" style="display:none">↗ 다른 시트로 복제</button>

    </div>
  </div>
</div>

<!-- ── 묶음 관리 모달 ── -->
<div id="modal-groups" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3>묶음 관리</h3>
      <button class="modal-close" data-modal="modal-groups">✕</button>
    </div>
    <div class="modal-body">
      <div id="group-list" class="tmpl-list"></div>
    </div>
    <div class="modal-footer">
      <button id="btn-open-group-create" class="primary">+ 묶음 추가</button>
      <button class="btn-cancel" data-modal="modal-groups">닫기</button>
    </div>
  </div>
</div>

<!-- ── 묶음 생성/편집 모달 ── -->
<div id="modal-group-create" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="grp-modal-title">묶음 추가</h3>
      <button class="modal-close" data-modal="modal-group-create">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>묶음 이름</label>
        <input type="text" id="grp-name" placeholder="예: 제안서 제출, 보고서 작성">
      </div>
      <div class="form-group">
        <label>소속 프로젝트</label>
        <select id="grp-project"></select>
      </div>
      <div class="form-group">
        <label>색상</label>
        <div id="grp-color-palette" style="display:flex;gap:8px;flex-wrap:wrap;padding:4px 0"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" data-modal="modal-group-create">취소</button>
      <button id="btn-grp-save" class="primary">추가</button>
    </div>
  </div>
</div>

<!-- ── 백업 모달 ── -->
<div id="modal-backup" class="modal-overlay hidden">
  <div class="modal-card modal-card-wide">
    <div class="modal-header">
      <h3>백업 / 히스토리</h3>
      <button class="modal-close" data-modal="modal-backup">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
        <button id="btn-backup-create" class="primary" style="height:30px;padding:0 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">+ 지금 백업</button>
      </div>
      <div id="backup-list" class="tmpl-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" data-modal="modal-backup">닫기</button>
    </div>
  </div>
</div>

<!-- ── 템플릿 저장 모달 ── -->
<div id="modal-save-template" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3>템플릿으로 저장</h3>
      <button class="modal-close" data-modal="modal-save-template">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>템플릿 이름</label>
        <input type="text" id="tmpl-save-name" placeholder="예: 제안서 제출">
      </div>
      <div class="form-group">
        <label>설명 (선택)</label>
        <textarea id="tmpl-save-desc" rows="2" placeholder="어떤 흐름인지 간략히 설명"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" data-modal="modal-save-template">취소</button>
      <button id="btn-tmpl-save-confirm" class="primary">저장</button>
    </div>
  </div>
</div>

<!-- ── 템플릿 불러오기 모달 ── -->
<div id="modal-load-template" class="modal-overlay hidden">
  <div class="modal-card modal-card-wide">
    <div class="modal-header">
      <h3>템플릿 불러오기</h3>
      <button class="modal-close" data-modal="modal-load-template">✕</button>
    </div>
    <div class="modal-body">
      <div id="tmpl-list" class="tmpl-list"></div>
      <div class="form-group" style="margin-top:14px">
        <label>새 프로젝트 이름</label>
        <input type="text" id="tmpl-load-project" placeholder="프로젝트 이름">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" data-modal="modal-load-template">취소</button>
      <button id="btn-tmpl-load-confirm" class="primary">불러오기</button>
    </div>
  </div>
</div>

<!-- ── 사용자 관리 모달 ── -->
<div id="modal-users" class="modal-overlay hidden">
  <div class="modal-card modal-card-wide">
    <div class="modal-header">
      <h3>사용자 관리</h3>
      <button class="modal-close" data-modal="modal-users">✕</button>
    </div>
    <div class="modal-body">
      <div id="user-list" class="tmpl-list"></div>
    </div>
    <div class="modal-footer">
      <button id="btn-open-add-user" class="primary">+ 사용자 추가</button>
      <button class="btn-cancel" data-modal="modal-users">닫기</button>
    </div>
  </div>
</div>

<!-- ── 사용자 추가 모달 ── -->
<div id="modal-add-user" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3>사용자 추가</h3>
      <button class="modal-close" data-modal="modal-add-user">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="new-user-name" placeholder="예: 홍길동">
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="new-user-email" placeholder="예: hong@company.com">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="new-user-password" placeholder="4자 이상">
      </div>
      <div class="form-group">
        <label>권한</label>
        <select id="new-user-role">
          <option value="member">팀원</option>
          <option value="manager">과장</option>
          <option value="leader">팀장</option>
          <option value="admin">관리자</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" data-modal="modal-add-user">취소</button>
      <button id="btn-add-user-confirm" class="primary">추가</button>
    </div>
  </div>
</div>

<!-- ── 프로젝트 관리 모달 ── -->
<div id="modal-projects" class="modal-overlay hidden">
  <div class="modal-card modal-card-wide">
    <div class="modal-header">
      <h3>프로젝트 관리</h3>
      <button class="modal-close" data-modal="modal-projects">✕</button>
    </div>
    <div class="modal-body">
      <div id="project-list" class="tmpl-list"></div>
    </div>
    <div class="modal-footer" style="flex-direction:column;align-items:stretch;gap:10px">
      <div style="display:flex;gap:8px">
        <input type="text" id="new-project-name" placeholder="새 프로젝트 이름"
          style="flex:1;height:36px;padding:0 12px;border:1px solid #E0E0E0;border-radius:7px;font-size:13px;font-family:inherit;outline:none">
        <button id="btn-add-project-confirm" class="primary"
          style="height:36px;padding:0 16px;border-radius:7px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:#C8102E;color:#fff;white-space:nowrap">
          + 추가
        </button>
      </div>
      <button class="btn-cancel" data-modal="modal-projects">닫기</button>
    </div>
  </div>
</div>

<!-- ── 뷰 시트 생성/편집 모달 ── -->
<div id="modal-view" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="view-modal-title">새 시트</h3>
      <button class="modal-close" data-modal="modal-view">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>시트 이름</label>
        <input type="text" id="view-name-input" placeholder="예: 이번 주 현황">
      </div>
      <div class="form-group">
        <label>프로젝트 선택 <span style="font-weight:400;color:#9E9E9E">(미선택 시 전체 표시)</span></label>
        <div id="view-project-checks" style="display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto;padding:4px 0"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" data-modal="modal-view">취소</button>
      <button id="btn-view-confirm" class="primary">저장</button>
    </div>
  </div>
</div>

<!-- ── 업무 복제 모달 ── -->
<div id="modal-copy-task" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3>다른 시트로 복제</h3>
      <button class="modal-close" data-modal="modal-copy-task">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>대상 시트</label>
        <select id="copy-task-sheet"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" data-modal="modal-copy-task">취소</button>
      <button id="btn-copy-task-confirm" class="primary">복제</button>
    </div>
  </div>
</div>

<script>
  // 모듈 로드 실패 포함 모든 상황에서 12초 후 로딩화면 강제 제거
  window.__loadingGuard = setTimeout(function() {
    var el = document.getElementById('app-loading');
    if (el) el.remove();
    var login = document.getElementById('login-overlay');
    if (login) login.classList.remove('hidden');
  }, 12000);

  // 모듈 오류 발생 시 즉시 로딩화면 제거
  window.addEventListener('error', function(e) {
    console.error('[오류]', e.message, e.filename, e.lineno);
    clearTimeout(window.__loadingGuard);
    var el = document.getElementById('app-loading');
    if (el) el.remove();
    var login = document.getElementById('login-overlay');
    if (login) login.classList.remove('hidden');
  });
  window.addEventListener('unhandledrejection', function(e) {
    console.error('[Promise 오류]', e.reason);
  });
</script>
<script type="module" src="app.js?v=2.2"></script>
</body>
</html>
