<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK Workflow</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ── 로그인 오버레이 ── -->
<div id="login-overlay">
  <div id="login-card">
    <div class="login-brand">DK Workflow</div>
    <p class="login-sub">로그인하여 시작하세요</p>
    <div id="login-error" class="login-error" style="display:none"></div>
    <div class="login-field">
      <label for="login-email">이메일</label>
      <input type="email" id="login-email" placeholder="admin@dk.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label for="login-password">비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button id="login-submit">로그인</button>
  </div>
</div>

<!-- ── 툴바 ── -->
<div id="toolbar">
  <span class="brand">DK Workflow</span>
  <div class="sep"></div>

  <select id="filter-project"></select>
  <select id="filter-assignee"></select>
  <select id="filter-status">
    <option value="">상태 전체</option>
    <option value="pending">대기</option>
    <option value="doing">진행중</option>
    <option value="review">완료요청</option>
    <option value="done">완료</option>
  </select>

  <div class="sep"></div>
  <button id="btn-reset-view">뷰 초기화</button>

  <div class="spacer"></div>

  <span class="hint">빈 곳 더블클릭 → 업무 추가 &nbsp;|&nbsp; 노드 끝 드래그 → 연결</span>

  <div class="spacer"></div>

  <button id="btn-switch-user" class="user-btn"></button>
  <button id="btn-add-task">+ 업무 추가</button>
  <button id="btn-add-project" class="primary">
    + 프로젝트
    <span id="pending-badge" class="pending-badge" style="display:none"></span>
  </button>
  <button id="btn-import">가져오기</button>
  <button id="btn-export">내보내기</button>
</div>

<!-- ── 메인 ── -->
<div id="main">
  <div id="graph-container"></div>

  <!-- ── 사이드 패널 ── -->
  <div id="side-panel">
    <div class="panel-header">
      <h3>업무 편집</h3>
      <button id="panel-close">✕</button>
    </div>
    <div class="panel-body">

      <div class="form-group">
        <label>업무명</label>
        <input type="text" id="task-name" placeholder="업무 이름을 입력하세요">
      </div>

      <div class="form-group">
        <label>프로젝트</label>
        <select id="task-project"></select>
      </div>

      <div class="form-group">
        <label>담당자</label>
        <input type="text" id="task-assignee" placeholder="담당자 이름">
      </div>

      <div class="form-group">
        <label>상태</label>
        <select id="task-status">
          <option value="todo">대기</option>
          <option value="wip">진행중</option>
          <option value="pending">완료요청</option>
          <option value="done">완료</option>
        </select>
      </div>

      <div class="form-group">
        <label>메모</label>
        <textarea id="task-note" rows="3" placeholder="메모를 입력하세요"></textarea>
      </div>

      <div class="form-group">
        <label>세부업무</label>
        <div id="subtask-list"></div>
        <button id="btn-add-subtask" class="btn-small">+ 세부업무 추가</button>
      </div>

      <div class="btn-row">
        <button id="btn-save-task" class="primary">저장</button>
        <button id="btn-delete-task" class="danger">삭제</button>
      </div>

    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
